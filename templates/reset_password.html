{% extends 'base.html' %}
{% block title %}Reset Password - VijayPDF{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-lg mt-5">
            <div class="card-header">
                <h3 class="text-center font-weight-light my-4">Set New Password</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="form-floating mb-3">
                        <input class="form-control" id="inputPassword" name="password" type="password"
                            placeholder="New Password" required minlength="8" />
                        <label for="inputPassword">New Password</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input class="form-control" id="inputPasswordConfirm" type="password"
                            placeholder="Confirm Password" required
                            oninput="if(this.value!=document.getElementById('inputPassword').value) this.setCustomValidity('Passwords must match'); else this.setCustomValidity('');" />
                        <label for="inputPasswordConfirm">Confirm Password</label>
                    </div>
                    <div class="d-flex align-items-center justify-content-center mt-4 mb-0">
                        <button type="submit" class="btn btn-primary w-100 py-2">Update Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
