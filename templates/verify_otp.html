{% extends 'base.html' %}
{% block title %}Verify Email - VijayPDF{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-lg mt-5">
            <div class="card-header"><h3 class="text-center font-weight-light my-4">Email Verification</h3></div>
            <div class="card-body">
                <p class="text-center text-muted">A 6-digit OTP has been sent to <strong>{{ email }}</strong>. Please enter it below to verify your account.</p>
                <form method="POST" action="{{ url_for('verify_otp') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <input type="hidden" name="email" value="{{ email }}">
                    <div class="form-floating mb-3">
                        <input class="form-control" id="otp" name="otp" type="text" placeholder="123456" required maxlength="6" style="letter-spacing: 5px; font-size: 24px; text-align: center;" />
                        <label for="otp">Enter 6-digit OTP</label>
                    </div>
                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                        <button type="submit" class="btn btn-primary w-100 py-2">Verify Account</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <div class="small"><a href="{{ url_for('login') }}">Back to Login</a></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
